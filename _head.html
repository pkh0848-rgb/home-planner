<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🏠 우리집 플래너</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
:root{--bg:#f4faf7;--card:#fff;--text:#1f2937;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff;padding:18px 24px 14px;text-align:center;position:relative}
.logo-title{font-family:'Pacifico',cursive;font-size:1.9rem;font-weight:400;letter-spacing:1px}
header p{font-size:.82rem;opacity:.9;margin-top:3px}
.who-chip{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:none;border-radius:20px;padding:4px 12px 4px 5px;cursor:pointer;color:#fff;font-size:.78rem;font-weight:700;font-family:inherit}
.who-chip:hover{background:rgba(255,255,255,.3)}
.who-ava{width:27px;height:27px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.notif-wrap{position:absolute;top:14px;right:14px;z-index:300}
.notif-btn{background:rgba(255,255,255,.18);border:none;font-size:1.1rem;cursor:pointer;width:38px;height:38px;border-radius:50%;position:relative;color:#fff;line-height:1}
.notif-btn:hover{background:rgba(255,255,255,.3)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:.62rem;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notif-panel{display:none;position:absolute;right:0;top:46px;width:300px;max-height:380px;overflow-y:auto;background:#fff;border-radius:18px;box-shadow:0 12px 36px rgba(16,80,60,.18);padding:8px;text-align:left;color:var(--text)}
.notif-panel.show{display:block;animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.notif-hdr{display:flex;align-items:baseline;gap:6px;padding:8px 12px 7px;border-bottom:1px solid var(--border);margin-bottom:4px}
.notif-hdr-title{font-size:.88rem;font-weight:800}
.notif-hdr-sub{font-size:.66rem;color:var(--muted);font-weight:500}
.notif-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px}
.notif-item.unread{background:#ecfdf5}
.notif-ava{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid transparent}
.notif-body{flex:1;min-width:0}
.notif-msg{font-size:.8rem;font-weight:500;line-height:1.45;color:#3f3d56}
.notif-msg b{font-weight:800}
.notif-time{font-size:.66rem;color:var(--muted);margin-top:2px;font-weight:500}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;opacity:0}
.notif-item.unread .notif-dot{opacity:1}
.notif-empty{padding:26px 18px;text-align:center;color:var(--muted);font-size:.78rem}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px 50px}
.sum-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:12px}
.sum-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.sum-title{font-weight:800;font-size:.95rem}
.sum-count{font-size:.8rem;color:var(--muted);font-weight:700}
.pbar{height:10px;background:#e8f5ef;border-radius:6px;overflow:hidden}
.pbar>div{height:100%;background:linear-gradient(90deg,#34d399,#10b981);border-radius:6px;transition:width .4s;width:0}
.sum-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sbdg{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:#f0fdf4;color:#166534}
.sbdg.warn{background:#fef2f2;color:#b91c1c}
.foot-btns{display:flex;gap:8px;margin-bottom:12px}
.fbtn{flex:1;padding:11px;border:none;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit}
.fbtn.pri{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.fbtn.sec2{background:#fff;color:var(--text);box-shadow:var(--sh)}
.sec{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:12px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sec-title{font-weight:800;font-size:.92rem}
.sec-sub{font-size:.7rem;color:var(--muted);font-weight:500}
.sec.overdue{border:1.5px solid #fecaca;background:#fffbfb}
.item{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid #f3f4f6}
.item:last-child{border-bottom:none}
.ckb{width:30px;height:30px;border-radius:50%;border:2.5px solid #d1d5db;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:.95rem;transition:all .15s;font-family:inherit}
.ckb.on{border-color:var(--mc);background:var(--mc);color:#fff}
.item-body{flex:1;min-width:0}
.item-name{font-size:.88rem;font-weight:600}
.item.done .item-name{text-decoration:line-through;color:var(--muted);font-weight:500}
.item-meta{font-size:.68rem;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.own-bdg{font-size:.64rem;font-weight:700;padding:1.5px 7px;border-radius:10px}
.date-bdg{font-size:.64rem;font-weight:700;color:#b91c1c;background:#fee2e2;padding:1.5px 7px;border-radius:10px}
.by-ava{width:20px;height:20px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid var(--mc);background:#fff}
.del-x{width:24px;height:24px;border:none;border-radius:7px;background:#fef2f2;color:#f87171;cursor:pointer;font-size:.85rem;flex-shrink:0}
.empty-row{color:var(--muted);font-size:.78rem;text-align:center;padding:10px 0}
.wk-scroll{overflow-x:auto}
table.wk{width:100%;border-collapse:collapse;font-size:.72rem;min-width:360px}
.wk th{padding:5px 2px;color:var(--muted);font-weight:700;font-size:.66rem;border-bottom:1.5px solid var(--border)}
.wk th.tdy{color:#0d9488}
.wk td{text-align:center;padding:7px 2px;border-bottom:1px solid #f3f4f6}
.wk td.rname{text-align:left;font-weight:600;font-size:.74rem;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.cell-dot{width:15px;height:15px;border-radius:50%;display:inline-block}
.cell-miss{color:#f87171;font-weight:900;font-size:.82rem}
.cell-due{display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px dashed #cbd5e1}
.legend{display:flex;gap:12px;margin-top:8px;font-size:.66rem;color:var(--muted)}
.cal-nav{background:#fff;border:1.5px solid var(--border);border-radius:9px;width:30px;height:30px;cursor:pointer;font-size:.75rem;font-family:inherit}
.cal-nav:hover{border-color:#10b981}
.cal-grid2{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-wd{text-align:center;font-size:.64rem;color:var(--muted);font-weight:700;padding:3px 0}
.cal-cell{min-height:54px;border-radius:9px;background:#fafdfb;padding:4px 2px;cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.cal-cell:hover{border-color:#6ee7b7}
.cal-cell.tdy{border-color:#10b981;background:#ecfdf5}
.cal-dn{font-size:.7rem;font-weight:700;text-align:center}
.cal-cell.sun .cal-dn{color:#ef4444}.cal-cell.sat .cal-dn{color:#3b82f6}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px}
.cd{width:7px;height:7px;border-radius:50%}
.cd.miss{background:transparent;border:1.5px solid #f87171;box-sizing:border-box}
.cd.due{background:transparent;border:1.5px dashed #cbd5e1;box-sizing:border-box}
.cal-more{font-size:.56rem;color:var(--muted);text-align:center;margin-top:1px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:1.05rem;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:.76rem;color:var(--muted);margin-bottom:12px}
.who-btns{display:flex;gap:10px}
.who-btn{flex:1;border:2.5px solid var(--border);border-radius:14px;background:#fff;padding:14px;cursor:pointer;text-align:center;font-family:inherit}
.who-btn:hover{border-color:#10b981;background:#f0fdf4}
.who-btn .nm{font-weight:800;margin-top:4px}
.rt-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:.82rem}
.rt-info{flex:1;min-width:0}
.rt-name{font-weight:700}
.rt-meta{font-size:.66rem;color:var(--muted);margin-top:1px}
.rt-del{width:26px;height:26px;border:none;border-radius:8px;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:.9rem;flex-shrink:0}
.add-form{margin-top:12px;border-top:2px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:9px}
.f-label{font-size:.72rem;font-weight:700;color:#6b7280}
.frow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.f-inp{flex:1;min-width:120px;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;font-size:.84rem;font-family:inherit;outline:none}
.f-inp:focus{border-color:#10b981}
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg button{padding:6px 11px;border:1.5px solid var(--border);background:#fff;border-radius:9px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit}
.seg button.on{border-color:#10b981;background:#ecfdf5;color:#047857}
.daypick{display:flex;gap:4px}
.daypick button{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit}
.daypick button.on{background:#10b981;border-color:#10b981;color:#fff}
.mbtn{padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.86rem;font-family:inherit;flex:1}
.mok{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.mno{background:#f3f4f6;color:var(--text)}
.mfooter{display:flex;gap:8px;margin-top:14px}
#ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#0d9488}
.sp{width:38px;height:38px;border:4px solid #a7f3d0;border-top-color:#0d9488;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.wrap{padding:10px 8px 40px}.logo-title{font-size:1.6rem}}

.cal-cell.seld{border-color:#6366f1;background:#eef2ff}
.sec-add{border:none;background:#ecfdf5;color:#047857;font-weight:800;font-size:.72rem;padding:4px 10px;border-radius:9px;cursor:pointer;font-family:inherit}
.sec-add:hover{background:#d1fae5}
.opt-box{display:flex;gap:6px;align-items:center;font-size:.8rem;font-weight:600}
.dom-inp{width:64px;padding:7px 8px;border:1.5px solid var(--border);border-radius:9px;font-size:.84rem;font-family:inherit;outline:none;text-align:center}
</style>
