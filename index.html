<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🏠 우리집 플래너</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
:root{--bg:#f4faf7;--card:#fff;--text:#1f2937;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff;padding:18px 24px 14px;text-align:center;position:relative}
.logo-title{font-family:'Pacifico',cursive;font-size:1.9rem;font-weight:400;letter-spacing:1px}
header p{font-size:.82rem;opacity:.9;margin-top:3px}
.who-chip{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:none;border-radius:20px;padding:4px 12px 4px 5px;cursor:pointer;color:#fff;font-size:.78rem;font-weight:700;font-family:inherit}
.who-chip:hover{background:rgba(255,255,255,.3)}
.who-ava{width:27px;height:27px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.notif-wrap{position:absolute;top:14px;right:14px;z-index:300}
.notif-btn{background:rgba(255,255,255,.18);border:none;font-size:1.1rem;cursor:pointer;width:38px;height:38px;border-radius:50%;position:relative;color:#fff;line-height:1}
.notif-btn:hover{background:rgba(255,255,255,.3)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:.62rem;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notif-panel{display:none;position:absolute;right:0;top:46px;width:300px;max-height:380px;overflow-y:auto;background:#fff;border-radius:18px;box-shadow:0 12px 36px rgba(16,80,60,.18);padding:8px;text-align:left;color:var(--text)}
.notif-panel.show{display:block;animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.notif-hdr{display:flex;align-items:baseline;gap:6px;padding:8px 12px 7px;border-bottom:1px solid var(--border);margin-bottom:4px}
.notif-hdr-title{font-size:.88rem;font-weight:800}
.notif-hdr-sub{font-size:.66rem;color:var(--muted);font-weight:500}
.notif-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px}
.notif-item.unread{background:#ecfdf5}
.notif-ava{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid transparent}
.notif-body{flex:1;min-width:0}
.notif-msg{font-size:.8rem;font-weight:500;line-height:1.45;color:#3f3d56}
.notif-msg b{font-weight:800}
.notif-time{font-size:.66rem;color:var(--muted);margin-top:2px;font-weight:500}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;opacity:0}
.notif-item.unread .notif-dot{opacity:1}
.notif-empty{padding:26px 18px;text-align:center;color:var(--muted);font-size:.78rem}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px 50px}
.sum-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:12px}
.sum-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.sum-title{font-weight:800;font-size:.95rem}
.sum-count{font-size:.8rem;color:var(--muted);font-weight:700}
.pbar{height:10px;background:#e8f5ef;border-radius:6px;overflow:hidden}
.pbar>div{height:100%;background:linear-gradient(90deg,#34d399,#10b981);border-radius:6px;transition:width .4s;width:0}
.sum-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sbdg{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:#f0fdf4;color:#166534}
.sbdg.warn{background:#fef2f2;color:#b91c1c}
.foot-btns{display:flex;gap:8px;margin-bottom:12px}
.fbtn{flex:1;padding:11px;border:none;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit}
.fbtn.pri{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.fbtn.sec2{background:#fff;color:var(--text);box-shadow:var(--sh)}
.sec{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:12px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sec-title{font-weight:800;font-size:.92rem}
.sec-sub{font-size:.7rem;color:var(--muted);font-weight:500}
.sec.overdue{border:1.5px solid #fecaca;background:#fffbfb}
.item{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid #f3f4f6}
.item:last-child{border-bottom:none}
.ckb{width:30px;height:30px;border-radius:50%;border:2.5px solid #d1d5db;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:.95rem;transition:all .15s;font-family:inherit}
.ckb.on{border-color:var(--mc);background:var(--mc);color:#fff}
.item-body{flex:1;min-width:0}
.item-name{font-size:.88rem;font-weight:600}
.item.done .item-name{text-decoration:line-through;color:var(--muted);font-weight:500}
.item-meta{font-size:.68rem;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.own-bdg{font-size:.64rem;font-weight:700;padding:1.5px 7px;border-radius:10px}
.date-bdg{font-size:.64rem;font-weight:700;color:#b91c1c;background:#fee2e2;padding:1.5px 7px;border-radius:10px}
.by-ava{width:20px;height:20px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid var(--mc);background:#fff}
.del-x{width:24px;height:24px;border:none;border-radius:7px;background:#fef2f2;color:#f87171;cursor:pointer;font-size:.85rem;flex-shrink:0}
.empty-row{color:var(--muted);font-size:.78rem;text-align:center;padding:10px 0}
.wk-scroll{overflow-x:auto}
table.wk{width:100%;border-collapse:collapse;font-size:.72rem;min-width:360px}
.wk th{padding:5px 2px;color:var(--muted);font-weight:700;font-size:.66rem;border-bottom:1.5px solid var(--border)}
.wk th.tdy{color:#0d9488}
.wk td{text-align:center;padding:7px 2px;border-bottom:1px solid #f3f4f6}
.wk td.rname{text-align:left;font-weight:600;font-size:.74rem;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.cell-dot{width:15px;height:15px;border-radius:50%;display:inline-block}
.cell-miss{color:#f87171;font-weight:900;font-size:.82rem}
.cell-due{display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px dashed #cbd5e1}
.legend{display:flex;gap:12px;margin-top:8px;font-size:.66rem;color:var(--muted)}
.memo-box{margin-top:8px}
.memo-ta{width:100%;min-height:64px;border:1px solid #e5e7eb;border-radius:10px;padding:8px;font-size:.8rem;font-family:inherit;resize:vertical;box-sizing:border-box;color:var(--text);background:#fff}
.cal-nav{background:#fff;border:1.5px solid var(--border);border-radius:9px;width:30px;height:30px;cursor:pointer;font-size:.75rem;font-family:inherit}
.cal-nav:hover{border-color:#10b981}
.cal-grid2{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-wd{text-align:center;font-size:.64rem;color:var(--muted);font-weight:700;padding:3px 0}
.cal-cell{min-height:54px;border-radius:9px;background:#fafdfb;padding:4px 2px;cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.cal-cell:hover{border-color:#6ee7b7}
.cal-cell.tdy{border-color:#10b981;background:#ecfdf5}
.cal-dn{font-size:.7rem;font-weight:700;text-align:center}
.cal-cell.sun .cal-dn{color:#ef4444}.cal-cell.sat .cal-dn{color:#3b82f6}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px}
.cd{width:7px;height:7px;border-radius:50%;box-sizing:border-box}
.cd.done{background:#10b981;border:none}
.cd.miss{background:transparent;border:1.5px solid #f87171}
.cd.due{background:transparent;border:1.5px solid #cbd5e1}
.cal-more{font-size:.56rem;color:var(--muted);text-align:center;margin-top:1px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:1.05rem;font-weight:800;margin-bottom:4px}
.modal-sub{font-size:.76rem;color:var(--muted);margin-bottom:12px}
.who-btns{display:flex;gap:10px}
.who-btn{flex:1;border:2.5px solid var(--border);border-radius:14px;background:#fff;padding:14px;cursor:pointer;text-align:center;font-family:inherit}
.who-btn:hover{border-color:#10b981;background:#f0fdf4}
.who-btn .nm{font-weight:800;margin-top:4px}
.rt-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:.82rem}
.rt-info{flex:1;min-width:0}
.rt-name{font-weight:700}
.rt-meta{font-size:.66rem;color:var(--muted);margin-top:1px}
.rt-del{width:26px;height:26px;border:none;border-radius:8px;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:.9rem;flex-shrink:0}
.add-form{margin-top:12px;border-top:2px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:9px}
.f-label{font-size:.72rem;font-weight:700;color:#6b7280}
.frow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.f-inp{flex:1;min-width:120px;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;font-size:.84rem;font-family:inherit;outline:none}
.f-inp:focus{border-color:#10b981}
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg button{padding:6px 11px;border:1.5px solid var(--border);background:#fff;border-radius:9px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit}
.seg button.on{border-color:#10b981;background:#ecfdf5;color:#047857}
.daypick{display:flex;gap:4px}
.daypick button{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit}
.daypick button.on{background:#10b981;border-color:#10b981;color:#fff}
#nthPick{display:flex;gap:4px;flex-wrap:wrap}
#nthPick button{width:auto;height:30px;border-radius:9px;padding:0 9px;border:1.5px solid var(--border);background:#fff;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit}
#nthPick button.on{background:#10b981;border-color:#10b981;color:#fff}
.mbtn{padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.86rem;font-family:inherit;flex:1}
.mok{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.mno{background:#f3f4f6;color:var(--text)}
.mfooter{display:flex;gap:8px;margin-top:14px}
#ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#0d9488}
.sp{width:38px;height:38px;border:4px solid #a7f3d0;border-top-color:#0d9488;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.wrap{padding:10px 8px 40px}.logo-title{font-size:1.6rem}}

.cal-cell.seld{border-color:#6366f1;background:#eef2ff}
.sec-add{border:none;background:#ecfdf5;color:#047857;font-weight:800;font-size:.72rem;padding:4px 10px;border-radius:9px;cursor:pointer;font-family:inherit}
.sec-add:hover{background:#d1fae5}
.opt-box{display:flex;gap:6px;align-items:center;font-size:.8rem;font-weight:600}
.dom-inp{width:64px;padding:7px 8px;border:1.5px solid var(--border);border-radius:9px;font-size:.84rem;font-family:inherit;outline:none;text-align:center}
</style></head>
<body>
<div id="ov"><div class="sp"></div><span>연결 중…</span></div>
<header>
  <button class="who-chip" id="whoChip" onclick="openWho()"><span class="who-ava" id="whoAva">👤</span><span id="whoName">누구?</span></button>
  <h1 class="logo-title">homeLog</h1>
  <p>우리집 집안일 플래너 🧺</p>
  <div class="notif-wrap" id="notifWrap">
    <button class="notif-btn" id="notifBtn">🔔<span class="notif-badge" id="notifBadge" style="display:none"></span></button>
    <div class="notif-panel" id="notifPanel"></div>
  </div>
</header>
<div class="wrap">
  <div class="sum-card">
    <div class="sum-top"><span class="sum-title">오늘 진행률</span><span class="sum-count" id="sumCount">0/0</span></div>
    <div class="pbar"><div id="pbarFill"></div></div>
    <div class="sum-badges" id="sumBadges"></div>
  </div>
  <div class="foot-btns">
    <button class="fbtn pri" onclick="openAdd()">➕ 집안일 추가</button>
    <button class="fbtn sec2" onclick="openManage()">🧺 집안일 목록</button>
  </div>
  <div class="sec">
    <div class="sec-h"><span class="sec-title">📆 캘린더</span><div style="display:flex;gap:7px;align-items:center"><button class="cal-nav" onclick="calNav(-1)">◀</button><span id="calLabel" style="font-weight:800;font-size:.82rem"></span><button class="cal-nav" onclick="calNav(1)">▶</button></div></div>
    <div class="cal-grid2" id="calGrid"></div>
    <div class="legend"><span style="color:#10b981">● 완료</span><span style="color:#f87171">○ 놓침</span><span>◌ 예정</span><span>· 날짜를 누르면 아래에 상세</span></div>

    </div>
  <div class="sec" id="dayPanelSec">
    <div class="sec-h"><span class="sec-title" id="dayTitle">📌 오늘 할 일</span><button class="sec-add" onclick="openAdd('date')">＋ 이날 추가</button></div>
    <div id="listDay"></div>
  </div>
  <div class="sec overdue" id="secOverdue" style="display:none">
    <div class="sec-h"><span class="sec-title">⚠️ 밀린 일</span><span class="sec-sub">지난 7일 중 놓친 일</span></div>
    <div id="listOverdue"></div>
  </div>
  <div class="sec" id="secWeekly">
    <div class="sec-h"><span class="sec-title" id="weeklyTitle">🗓️ 이번주 안에</span><button class="sec-add" onclick="openAdd('week')">＋ 추가</button></div>
    <div id="listWeekly"></div>
  </div>
  <div class="sec" id="secMonthly">
    <div class="sec-h"><span class="sec-title" id="monthlyTitle">📅 이번달 안에</span><span class="sec-sub" id="monthLabel"></span></div>
    <div id="listMonthly"></div>
  </div>
</div>
<div class="modal-bg" id="whoBg">
  <div class="modal">
    <h3>👋 누구세요?</h3>
    <p class="modal-sub">이 기기에서 체크하면 이 이름으로 기록돼요</p>
    <div class="who-btns" id="whoBtns"></div>
  </div>
</div>
<div class="modal-bg" id="manageBg" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3>🧺 등록된 집안일</h3>
    <p class="modal-sub">반복 루틴 목록이에요. 새로 만들 땐 ‘➕ 집안일 추가’를 눌러줘요</p>
    <div id="rtList"></div>
    <div class="mfooter"><button class="mbtn mno" onclick="document.getElementById('manageBg').classList.remove('show')">닫기</button><button class="mbtn mok" onclick="openAdd('routine')">＋ 새 집안일 추가</button></div>
  </div>
</div>
<div class="modal-bg" id="addBg" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <h3 id="addTitle">➕ 집안일 추가</h3>

    <div class="frow"><input class="f-inp" id="xName" placeholder="예: 설거지, 택배 반품…" maxlength="24"/><input class="f-inp" id="xEmoji" placeholder="이모지" maxlength="2" style="flex:0 0 70px;min-width:70px;text-align:center"/></div>
    <div class="f-label" style="margin-top:10px">언제 할 일이에요?</div>
    <div class="seg" id="typeSeg" style="margin-top:6px">
      <button data-t="date" id="tsDate" class="on">특정 날짜 (한 번)</button>
      <button data-t="week" id="tsWeek">이번주 안에 (한 번)</button>
      <button data-t="days">매주 특정 요일</button>
      <button data-t="monthday">매달 같은 날짜</button>
      <button data-t="monthweek">매달 N째주 요일</button>
      <button data-t="daily">매일</button>
      <button data-t="weekly">매주 1회 (아무 날)</button>
      <button data-t="monthly">매달 1회 (아무 날)</button>
    </div>
    <div id="optDate" class="opt-box" style="margin-top:8px"><input type="date" class="f-inp" id="xDate" style="flex:0 0 170px"/></div>
    <div id="optDays" class="daypick" style="display:none;margin-top:8px"></div>
    <div id="optDom" class="opt-box" style="display:none;margin-top:8px">매달 <input type="number" class="dom-inp" id="xDom" min="1" max="31" value="1"/> 일 (말일보다 크면 말일에 떠요)</div>
    <div id="optMonthWeek" class="opt-box" style="display:none;margin-top:8px;flex-wrap:wrap">매달 <div class="daypick" id="nthPick"></div> 주 <select class="f-inp" id="xWd" style="flex:0 0 84px;min-width:84px"></select>요일</div>
    <div class="f-label" style="margin-top:10px">담당</div>
    <div class="seg" id="xOwnSeg" style="margin-top:6px">
      <button data-o="any" class="on">같이 / 아무나</button>
      <button data-o="kh"></button>
      <button data-o="jn"></button>
    </div>
    <div id="xMsg" style="font-size:.74rem;color:#dc2626;min-height:14px;text-align:center;margin-top:6px"></div>
    <div class="mfooter"><button class="mbtn mno" onclick="document.getElementById('addBg').classList.remove('show')">취소</button><button class="mbtn mok" id="addOkBtn" onclick="addUnified()">추가하기</button></div>
  </div>
</div>

};
const MK=['kh','jn'];
const WD=['일','월','화','수','목','금','토'];
const pad=n=>String(n).padStart(2,'0');
function kStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayK(){return kStr(new Date());}
function parseK(k){var p=k.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function mkAva(p,sz){return '<svg viewBox="0 0 80 80" style="width:'+sz+'px;height:'+sz+'px;display:block">'+MEMBERS[p].svg+'</svg>';}
function josa(n,a,b){var c=n.charCodeAt(n.length-1);if(c<0xAC00||c>0xD7A3)return a;return (c-0xAC00)%28>0?a:b;}
let me=localStorage.getItem('hp_who');
if(me&&!MEMBERS[me])me=null;
let routines={},doneLog={},extras={},weekTodos={},loaded=0;
let archDone={},archExtras={},listenStartK='0000-00-00';
let selDayK=todayK();
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let monthCache={};
function ownBdg(o){
  if(o==='any'||!o)return '<span class="own-bdg" style="background:#f3f4f6;color:#6b7280">같이</span>';
  var m=MEMBERS[o];return '<span class="own-bdg" style="background:'+m.light+';color:'+m.dark+'">'+m.name+'</span>';
}
var NTHK=['','첫째','둘째','셋째','넷째'];
function freqLabel(r){
  if(r.freq==='daily')return '매일';
  if(r.freq==='days')return (r.days||[]).slice().sort().map(function(d){return WD[d];}).join('·')+'요일';
  if(r.freq==='weekly')return '매주 1회';
  if(r.freq==='monthday')return '매달 '+r.dom+'일';
  if(r.freq==='monthweek')return '매달 '+(r.nths||[r.nth||1]).slice().sort().map(function(n){return NTHK[n];}).join('·')+'주 '+WD[r.wd||0]+'요일';
  return '매달 1회';
}
function isScheduled(r,dateK){
  if(r.createdK&&dateK<r.createdK)return false;
  if(r.freq==='daily')return true;
  if(r.freq==='days')return (r.days||[]).indexOf(parseK(dateK).getDay())>=0;
  if(r.freq==='monthday'){
    var d=parseK(dateK);var dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return d.getDate()===Math.min(r.dom||1,dim);
  }
  if(r.freq==='monthweek'){
    var d2=parseK(dateK);
    var nths2=r.nths||[r.nth||1];
    return d2.getDay()===(r.wd||0)&&nths2.indexOf(Math.ceil(d2.getDate()/7))>=0;
  }
  return false;
}
function isDated(r){return r.freq==='daily'||r.freq==='days'||r.freq==='monthday'||r.freq==='monthweek';}
function doneEntry(dateK,id){var src=doneLog[dateK]||archDone[dateK];return src&&src[id]?src[id]:null;}
function extrasAt(k){return extras[k]||archExtras[k]||{};}
function weekDatesOf(k){
  var d=parseK(k);d.setDate(d.getDate()-((d.getDay()+6)%7));
  var a=[];for(var i=0;i<7;i++){a.push(kStr(d));d.setDate(d.getDate()+1);}return a;
}
function weekDates(){return weekDatesOf(todayK());}
function mdShort(k){var p=k.split('-');return (+p[1])+'/'+(+p[2]);}
function findDoneInRange(id,keys){
  for(var i=0;i<keys.length;i++){if(doneEntry(keys[i],id))return keys[i];}
  return null;
}
function monthKeysOf(pre){
  var set={};
  Object.keys(doneLog).forEach(function(k){if(k.indexOf(pre)===0)set[k]=1;});
  Object.keys(archDone).forEach(function(k){if(k.indexOf(pre)===0)set[k]=1;});
  return Object.keys(set);
}
function countWeeklyRemain(wk,includeTodos){
  var n=0;
  Object.keys(routines).forEach(function(id){if(routines[id].freq!=='weekly')return;if(!findDoneInRange(id,wk))n++;});
  if(includeTodos)Object.keys(weekTodos).forEach(function(id){if(!findDoneInRange(id,wk))n++;});
  return n;
}
function countMonthlyRemain(mks){
  var n=0;
  Object.keys(routines).forEach(function(id){if(routines[id].freq!=='monthly')return;if(!findDoneInRange(id,mks))n++;});
  return n;
}
function ensureMonth(y,m,cb){
  var pre=y+'-'+pad(m+1);
  if(monthCache[pre]){cb();return;}
  monthCache[pre]=true;
  Promise.all([
    db.ref(ROOT+'/done').orderByKey().startAt(pre+'-01').endAt(pre+'-31').once('value'),
    db.ref(ROOT+'/extras').orderByKey().startAt(pre+'-01').endAt(pre+'-31').once('value')
  ]).then(function(rs){
    Object.keys(archDone).forEach(function(k){if(k.indexOf(pre)===0)delete archDone[k];});
    Object.keys(archExtras).forEach(function(k){if(k.indexOf(pre)===0)delete archExtras[k];});
    rs[0].forEach(function(c){archDone[c.key]=c.val();});
    rs[1].forEach(function(c){archExtras[c.key]=c.val();});
    cb();
  });
}

  if(de&&MEMBERS[de.by])h+='<span class="by-ava">'+mkAva(de.by,17)+'</span><span style="color:'+MEMBERS[de.by].dark+';font-weight:700">'+MEMBERS[de.by].name+' 완료</span>';
  h+='</div></div>';
  if(opt.del)h+='<button class="del-x" onclick="'+opt.del+'">×</button>';

function renderAll(){

  Object.keys(routines).forEach(function(id){

    tTotal++;if(doneEntry(tk,id))tDone++;
  });
  var tex=extrasAt(tk);

  /* weekly section: based on the SELECTED day's week */

  var wH='',hasW=false;
  Object.keys(routines).forEach(function(id){

  });
  if(isCurWeek){
    Object.keys(weekTodos).forEach(function(id){
      hasW=true;
      var t=weekTodos[id];
      var dk=findDoneInRange(id,vwk);var de=dk?doneEntry(dk,id):null;
      wH+=itemRow({name:t.name,emoji:t.emoji||'🗓️',owner:t.owner||'any',de:de,meta:de?dk.slice(5).replace('-','/')+' 완료':'이번주만',action:de?"toggle('"+dk+"','"+id+"')":(vctk?"toggle('"+vctk+"','"+id+"')":"alert('아직 안 온 주예요!')"),del:de?null:"delWeekTodo('"+id+"')"});
    });
  }
  document.getElementById('weeklyTitle').textContent=isCurWeek?'🗓️ 이번주 안에':'🗓️ '+mdShort(vwk[0])+'~'+mdShort(vwk[6])+' 안에';
  document.getElementById('listWeekly').innerHTML=wH||'<div class="empty-row">'+(isCurWeek?'이번주':'이 주')+' 안에 할 일이 없어요</div>';
  /* monthly section: based on the SELECTED day's month */
  var isCurMonth=(vmonPre===tk.slice(0,7));
  var vmks=monthKeysOf(vmonPre);
  var mlast=vmonPre+'-'+pad(new Date(+vmonPre.slice(0,4),+vmonPre.slice(5,7),0).getDate());
  var vcmk=isCurMonth?tk:(vmonPre<tk.slice(0,7)?mlast:null);
  var mH='',hasM=false;
  Object.keys(routines).forEach(function(id){
    var r=routines[id];if(r.freq!=='monthly')return;
    hasM=true;
    var dk=findDoneInRange(id,vmks);var de=dk?doneEntry(dk,id):null;
    mH+=itemRow({name:r.name,emoji:r.emoji,owner:r.owner,de:de,meta:de?dk.slice(5).replace('-','/')+' 완료':'매달 반복',action:de?"toggle('"+dk+"','"+id+"')":(vcmk?"toggle('"+vcmk+"','"+id+"')":"alert('아직 안 온 달이에요!')")});
  });
  document.getElementById('secMonthly').style.display=hasM?'':'none';
  document.getElementById('monthlyTitle').textContent=isCurMonth?'📅 이번달 안에':'📅 '+(+vmonPre.slice(5,7))+'월 안에';
  document.getElementById('monthLabel').textContent=(+vmonPre.slice(5,7))+'월 마지막 날까지';

  /* badges (always based on current real week/month) */

  var wRemain=countWeeklyRemain(wk,true);
  var mRemain=countMonthlyRemain(monthKeysOf(tk.slice(0,7)));
  if(wRemain)bH+='<span class="sbdg">이번주 안에 '+wRemain+'건</span>';
  if(mRemain)bH+='<span class="sbdg">이번달 안에 '+mRemain+'건</span>';

function renderCal(){
  var el=document.getElementById('calGrid');if(!el)return;
  document.getElementById('calLabel').textContent=calY+'년 '+(calM+1)+'월';
  loadMemo();
  var tk=todayK();
  var fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
  var h='';
  WD.forEach(function(w){h+='<div class="cal-wd">'+w+'</div>';});
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var d=1;d<=dim;d++){
    var k=calY+'-'+pad(calM+1)+'-'+pad(d);
    var dow=new Date(calY,calM,d).getDay();
    var dots=[],handled={};
    Object.keys(routines).forEach(function(id){
      var r=routines[id];var de=doneEntry(k,id);
      if(de){handled[id]=1;dots.push('<span class="cd done"></span>');}
      else if(isDated(r)&&isScheduled(r,k)){handled[id]=1;dots.push(k<tk?'<span class="cd miss"></span>':'<span class="cd due"></span>');}
    });
    var ex=extrasAt(k);
    Object.keys(ex).forEach(function(xid){
      handled[xid]=1;
      var de=doneEntry(k,xid);
      if(de)dots.push('<span class="cd done"></span>');
      else dots.push(k<tk?'<span class="cd miss"></span>':'<span class="cd due"></span>');
    });
    var dl=Object.assign({},archDone[k]||{},doneLog[k]||{});
    Object.keys(dl).forEach(function(id){
      if(handled[id])return;
      var de=dl[id];
      dots.push('<span class="cd done"></span>');
    });
    var more=dots.length>6?'<div class="cal-more">+'+(dots.length-6)+'</div>':'';
    h+='<div class="cal-cell'+(k===tk?' tdy':'')+(k===selDayK?' seld':'')+(dow===0?' sun':dow===6?' sat':'')+'" onclick="selectDay(\''+k+'\')"><div class="cal-dn">'+d+'</div><div class="cal-dots">'+dots.slice(0,6).join('')+'</div>'+more+'</div>';
  }
  el.innerHTML=h;
}

/* ───── actions ───── */
async function toggle(dateK,id){
  if(!me){openWho();return;}
  var cur=doneEntry(dateK,id);
  try{
    if(cur){await db.ref(ROOT+'/done/'+dateK+'/'+id).remove();}
    else{
      await db.ref(ROOT+'/done/'+dateK+'/'+id).set({by:me,ts:Date.now()});
      var nm=routines[id]?routines[id].name:(extrasAt(dateK)[id]||weekTodos[id]||{}).name;
      if(nm)db.ref(ROOT+'/notifications').push({ts:Date.now(),p:me,name:nm,act:'done'});
    }
    if(dateK<listenStartK){delete monthCache[dateK.slice(0,7)];ensureMonth(+dateK.slice(0,4),+dateK.slice(5,7)-1,renderAll);}
  }catch(e){alert('저장 실패: '+e.message);}
}
async function delExtra(dateK,xid){
  if(!confirm('이 할 일을 삭제할까?'))return;
  await db.ref(ROOT+'/extras/'+dateK+'/'+xid).remove();
  await db.ref(ROOT+'/done/'+dateK+'/'+xid).remove();
  if(dateK<listenStartK){delete monthCache[dateK.slice(0,7)];ensureMonth(+dateK.slice(0,4),+dateK.slice(5,7)-1,renderAll);}
}
async function delWeekTodo(id){
  if(!confirm('이 할 일을 삭제할까?'))return;
  var wk=weekDates();
  await db.ref(ROOT+'/weekTodos/'+wk[0]+'/'+id).remove();
  for(var i=0;i<wk.length;i++){if(doneEntry(wk[i],id))await db.ref(ROOT+'/done/'+wk[i]+'/'+id).remove();}
}

}
async function addUnified(){
  var nm=document.getElementById('xName').value.trim();
  var em=document.getElementById('xEmoji').value.trim();
  var msg=document.getElementById('xMsg');
  if(!me){openWho();return;}
  if(!nm){msg.textContent='이름을 입력해줘!';return;}
  try{
    if(editId){
      if(xType==='date'||xType==='week'){msg.textContent='반복 종류를 골라줘!';return;}
      var eobj={name:nm,emoji:em||'🧹',freq:xType,owner:xOwn,days:null,dom:null,nth:null,nths:null,wd:null};
      if(xType==='days'){
        if(!xDays.length){msg.textContent='요일을 하나 이상 골라줘!';return;}
        eobj.days=xDays.slice().sort();
      }
      if(xType==='monthday'){
        var edom=parseInt(document.getElementById('xDom').value,10);
        if(!edom||edom<1||edom>31){msg.textContent='1~31 사이 날짜를 넣어줘!';return;}
        eobj.dom=edom;
      }
      if(xType==='monthweek'){
        if(!xNths.length){msg.textContent='몇째 주인지 하나 이상 골라줘!';return;}
        eobj.nths=xNths.slice().sort();
        eobj.wd=parseInt(document.getElementById('xWd').value,10);
      }
      await db.ref(ROOT+'/routines/'+editId).update(eobj);
      db.ref(ROOT+'/notifications').push({ts:Date.now(),p:me,name:nm,act:'edit'});
      document.getElementById('addBg').classList.remove('show');
      editId=null;
      return;
    }
    if(xType==='date'){
      var dk=document.getElementById('xDate').value;
      if(!dk){msg.textContent='날짜를 골라줘!';return;}
      await db.ref(ROOT+'/extras/'+dk).push({name:nm,owner:xOwn,emoji:em||null});
      if(dk<listenStartK){delete monthCache[dk.slice(0,7)];ensureMonth(+dk.slice(0,4),+dk.slice(5,7)-1,renderAll);}
      selectDay(dk);
      if(dk.slice(0,7)!==(calY+'-'+pad(calM+1))){calY=+dk.slice(0,4);calM=+dk.slice(5,7)-1;ensureMonth(calY,calM,renderCal);}
    }else if(xType==='week'){
      await db.ref(ROOT+'/weekTodos/'+weekDates()[0]).push({name:nm,owner:xOwn,emoji:em||null});
    }else{
      var obj={name:nm,emoji:em||'🧹',freq:xType,owner:xOwn,createdK:todayK()};
      if(xType==='days'){
        if(!xDays.length){msg.textContent='요일을 하나 이상 골라줘!';return;}
        obj.days=xDays.slice().sort();
      }
      if(xType==='monthday'){
        var dom=parseInt(document.getElementById('xDom').value,10);
        if(!dom||dom<1||dom>31){msg.textContent='1~31 사이 날짜를 넣어줘!';return;}
        obj.dom=dom;
      }
      if(xType==='monthweek'){
        if(!xNths.length){msg.textContent='몇째 주인지 하나 이상 골라줘!';return;}
        obj.nths=xNths.slice().sort();
        obj.wd=parseInt(document.getElementById('xWd').value,10);
      }
      await db.ref(ROOT+'/routines').push(obj);
    }
    db.ref(ROOT+'/notifications').push({ts:Date.now(),p:me,name:nm,act:'add'});
    document.getElementById('addBg').classList.remove('show');
  }catch(e){msg.textContent='저장 실패: '+e.message;}
}
function initAddForm(){
  document.querySelectorAll('#typeSeg button').forEach(function(b){
    b.onclick=function(){xType=b.dataset.t;document.querySelectorAll('#typeSeg button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');syncAddOpts();};
  });
  var dp=document.getElementById('optDays');
  WD.forEach(function(w,i){
    var b=document.createElement('button');b.textContent=w;
    b.onclick=function(){var ix=xDays.indexOf(i);if(ix>=0){xDays.splice(ix,1);b.classList.remove('on');}else{xDays.push(i);b.classList.add('on');}};
    dp.appendChild(b);
  });
  var wdSel=document.getElementById('xWd');
  WD.forEach(function(w,i){
    var o=document.createElement('option');o.value=i;o.textContent=w;
    wdSel.appendChild(o);
  });
  var np=document.getElementById('nthPick');
  NTHK.slice(1).forEach(function(lbl,i){
    var n=i+1;
    var b=document.createElement('button');b.textContent=lbl;
    b.onclick=function(){var ix=xNths.indexOf(n);if(ix>=0){xNths.splice(ix,1);b.classList.remove('on');}else{xNths.push(n);b.classList.add('on');}};
    np.appendChild(b);
  });
  var os=document.querySelectorAll('#xOwnSeg button');
  os[1].textContent=MEMBERS.kh.name;os[2].textContent=MEMBERS.jn.name;
  os.forEach(function(b){
    b.onclick=function(){xOwn=b.dataset.o;os.forEach(function(x){x.classList.remove('on');});b.classList.add('on');};
  });
}
/* ───── manage list ───── */
function openManage(){renderRtList();document.getElementById('manageBg').classList.add('show');}
function renderRtList(){
  var h='';
  Object.keys(routines).forEach(function(id){
    var r=routines[id];
    h+='<div class="rt-row" onclick="openAdd(null,\''+id+'\')" style="cursor:pointer"><div class="rt-info"><div class="rt-name">'+(r.emoji?r.emoji+' ':'')+r.name+'</div><div class="rt-meta">'+freqLabel(r)+' · '+(r.owner==='any'?'같이':MEMBERS[r.owner].name)+'</div></div>'+ownBdg(r.owner)+'<button class="rt-del" onclick="event.stopPropagation();delRoutine(\''+id+'\')">×</button></div>';
  });
  document.getElementById('rtList').innerHTML=h||'<div class="empty-row">아직 반복 루틴이 없어요</div>';
}
async function delRoutine(id){
  var r=routines[id];if(!r)return;
  if(!confirm('\''+r.name+'\' 루틴을 삭제할까?'))return;
  await db.ref(ROOT+'/routines/'+id).remove();
  renderRtList();
}
/* ───── who ───── */
function openWho(){
  var el=document.getElementById('whoBtns');el.innerHTML='';
  MK.forEach(function(p){
    var m=MEMBERS[p];
    var b=document.createElement('button');b.className='who-btn';
    b.innerHTML='<div style="width:54px;height:54px;margin:0 auto">'+mkAva(p,54)+'</div><div class="nm" style="color:'+m.dark+'">'+m.name+'</div>';
    b.onclick=function(){me=p;localStorage.setItem('hp_who',p);document.getElementById('whoBg').classList.remove('show');renderWho();};
    el.appendChild(b);
  });
  document.getElementById('whoBg').classList.add('show');
}
function renderWho(){
  if(me&&MEMBERS[me]){
    document.getElementById('whoAva').innerHTML=mkAva(me,24);
    document.getElementById('whoName').textContent=MEMBERS[me].name;
  }
}
/* ───── notifications ───── */
var notifs=[];
var notifLastRead=+(localStorage.getItem('hp_notifLastRead')||0);
function relTime(ts){
  var diff=Date.now()-ts;if(diff<0)diff=0;
  var m=Math.floor(diff/60000);
  if(m<1)return '방금 전';
  if(m<60)return m+'분 전';
  var h=Math.floor(m/60),rm=m%60;
  if(h<24)return h+'시간 '+(rm?rm+'분 ':'')+'전';
  return Math.floor(h/24)+'일 전';
}
function renderNotifs(){
  var badge=document.getElementById('notifBadge');
  var panel=document.getElementById('notifPanel');
  var unread=notifs.filter(function(n){return n.ts>notifLastRead;}).length;
  if(unread>0){badge.style.display='flex';badge.textContent=unread>99?'99+':unread;}
  else badge.style.display='none';
  var hdr='<div class="notif-hdr"><span class="notif-hdr-title">🔔 알림</span><span class="notif-hdr-sub">우리집 소식</span></div>';
  var empty='<div class="notif-empty">아직 새로운 소식이 없어요 🌿</div>';
  if(!notifs.length){panel.innerHTML=hdr+empty;return;}
  var html='';
  notifs.forEach(function(n){
    var m=MEMBERS[n.p];if(!m||!n.name)return;
    var tail=n.act==='add'?josa(n.name,'을','를')+' 새로 등록했어요 📝':josa(n.name,'을','를')+' 끝냈어요 ✨';
    var msg='<b style="color:'+m.dark+'">'+m.name+'</b>'+josa(m.name,'이','가')+' <b>'+n.name+'</b>'+tail;
    html+='<div class="notif-item'+(n.ts>notifLastRead?' unread':'')+'"><div class="notif-ava" style="background:'+m.light+';border-color:'+m.color+'55">'+mkAva(n.p,24)+'</div><div class="notif-body"><div class="notif-msg">'+msg+'</div><div class="notif-time">'+relTime(n.ts)+'</div></div><div class="notif-dot"></div></div>';
  });
  panel.innerHTML=hdr+(html||empty);
}
db.ref(ROOT+'/notifications').orderByKey().limitToLast(50).on('value',function(s){
  notifs=[];s.forEach(function(c){var v=c.val();if(v&&v.ts)notifs.push(v);});
  notifs.sort(function(a,b){return b.ts-a.ts;});
  renderNotifs();
});
document.getElementById('notifBtn').onclick=function(e){
  e.stopPropagation();
  var panel=document.getElementById('notifPanel');
  if(!panel.classList.contains('show')){
    renderNotifs();panel.classList.add('show');
    notifLastRead=Date.now();
    try{localStorage.setItem('hp_notifLastRead',String(notifLastRead));}catch(err){}
    document.getElementById('notifBadge').style.display='none';
  }else{panel.classList.remove('show');renderNotifs();}
};
document.addEventListener('click',function(e){
  var wrap=document.getElementById('notifWrap');var panel=document.getElementById('notifPanel');
  if(panel.classList.contains('show')&&!wrap.contains(e.target)){panel.classList.remove('show');renderNotifs();}
});
/* ───── listeners & seed ───── */
function checkLoaded(){loaded++;if(loaded>=3)document.getElementById('ov').style.display='none';}
db.ref(ROOT+'/routines').on('value',function(s){routines=s.val()||{};renderAll();checkLoaded();});
(function(){
  var start=new Date();start.setDate(start.getDate()-40);var sk=kStr(start);listenStartK=sk;
  db.ref(ROOT+'/done').orderByKey().startAt(sk).on('value',function(s){doneLog={};s.forEach(function(c){doneLog[c.key]=c.val();});renderAll();checkLoaded();});
  db.ref(ROOT+'/extras').orderByKey().startAt(sk).on('value',function(s){extras={};s.forEach(function(c){extras[c.key]=c.val();});renderAll();checkLoaded();});
  db.ref(ROOT+'/weekTodos/'+weekDates()[0]).on('value',function(s){weekTodos=s.val()||{};renderAll();});
})();
db.ref(ROOT+'/seeded').once('value',function(s){
  if(s.val())return;
  db.ref(ROOT+'/seeded').set(true);
  var ck=todayK();
  var defaults=[
    {name:'설거지',emoji:'🍽️',freq:'daily',owner:'any',createdK:ck},
    {name:'바닥 청소',emoji:'🧹',freq:'days',days:[0,3],owner:'any',createdK:ck},
    {name:'분리수거',emoji:'♻️',freq:'days',days:[0],owner:'any',createdK:ck},
    {name:'빨래',emoji:'👕',freq:'weekly',owner:'any',createdK:ck},
    {name:'화장실 청소',emoji:'🚽',freq:'weekly',owner:'any',createdK:ck},
    {name:'침구 세탁',emoji:'🛏️',freq:'monthly',owner:'any',createdK:ck}
  ];
  defaults.forEach(function(r){db.ref(ROOT+'/routines').push(r);});
});
initAddForm();
renderWho();
if(!me)setTimeout(openWho,600);
setInterval(function(){renderAll();renderNotifs();},60000);
</script>
