name: Daily task notification

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 09:00 KST (매일 아침 9시)
  workflow_dispatch: {}    # 수동 테스트용

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install web-push --no-fund --no-audit
      - run: node notify.mjs
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
