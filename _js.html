<script>
firebase.initializeApp({apiKey:"AIzaSyBjlWA9GHPvL4sGEdOShwyaCnPDuLgIcPA",authDomain:"studylog-cd02a.firebaseapp.com",databaseURL:"https://studylog-cd02a-default-rtdb.firebaseio.com",projectId:"studylog-cd02a",storageBucket:"studylog-cd02a.firebasestorage.app",messagingSenderId:"714212261002",appId:"1:714212261002:web:075c8c992ba986b5a9c173"});
const db=firebase.database();
const ROOT='chorePlanner';
const MEMBERS={
  kh:{name:'관형',color:'#6366f1',light:'#eef2ff',dark:'#4338ca',
    svg:'<ellipse cx="21" cy="36" rx="10" ry="14" fill="#d97706" transform="rotate(-12,21,36)"/><ellipse cx="59" cy="36" rx="10" ry="14" fill="#d97706" transform="rotate(12,59,36)"/><ellipse cx="40" cy="46" rx="22" ry="20" fill="#fbbf24" stroke="#d97706" stroke-width="2"/><ellipse cx="40" cy="53" rx="12" ry="9" fill="#fde68a"/><circle cx="32" cy="41" r="5" fill="#fff"/><circle cx="48" cy="41" r="5" fill="#fff"/><circle cx="33" cy="42" r="3.5" fill="#1e1b4b"/><circle cx="49" cy="42" r="3.5" fill="#1e1b4b"/><circle cx="34" cy="41" r="1.2" fill="#fff"/><circle cx="50" cy="41" r="1.2" fill="#fff"/><ellipse cx="40" cy="50" rx="4" ry="3" fill="#92400e"/><path d="M36 54 Q40 58 44 54" stroke="#78350f" stroke-width="1.5" fill="none" stroke-linecap="round"/>'},

};
const MK=['kh','jn'];
const WD=['일','월','화','수','목','금','토'];
const pad=n=>String(n).padStart(2,'0');
function kStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayK(){return kStr(new Date());}
function parseK(k){var p=k.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function mkAva(p,sz){return '<svg viewBox="0 0 80 80" style="width:'+sz+'px;height:'+sz+'px;display:block">'+MEMBERS[p].svg+'</svg>';}
function josa(n,a,b){var c=n.charCodeAt(n.length-1);if(c<0xAC00||c>0xD7A3)return a;return (c-0xAC00)%28>0?a:b;}
let me=localStorage.getItem('hp_who');
if(me&&!MEMBERS[me])me=null;
let routines={},doneLog={},extras={},weekTodos={},loaded=0;
let archDone={},archExtras={},listenStartK='0000-00-00';
let selDayK=todayK();
let calY=new Date().getFullYear(),calM=new Date().getMonth();
let monthCache={};
function ownBdg(o){
  if(o==='any'||!o)return '<span class="own-bdg" style="background:#f3f4f6;color:#6b7280">같이</span>';
  var m=MEMBERS[o];return '<span class="own-bdg" style="background:'+m.light+';color:'+m.dark+'">'+m.name+'</span>';
}
function freqLabel(r){
  if(r.freq==='daily')return '매일';
  if(r.freq==='days')return (r.days||[]).slice().sort().map(function(d){return WD[d];}).join('·')+'요일';
  if(r.freq==='weekly')return '매주 1회';
  if(r.freq==='monthday')return '매달 '+r.dom+'일';
  return '매달 1회';
}
function isScheduled(r,dateK){
  if(r.createdK&&dateK<r.createdK)return false;
  if(r.freq==='daily')return true;
  if(r.freq==='days')return (r.days||[]).indexOf(parseK(dateK).getDay())>=0;
  if(r.freq==='monthday'){
    var d=parseK(dateK);var dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return d.getDate()===Math.min(r.dom||1,dim);
  }
  return false;
}
function isDated(r){return r.freq==='daily'||r.freq==='days'||r.freq==='monthday';}
function doneEntry(dateK,id){var src=doneLog[dateK]||archDone[dateK];return src&&src[id]?src[id]:null;}
function extrasAt(k){return extras[k]||archExtras[k]||{};}
function weekDates(){
  var d=new Date();d.setDate(d.getDate()-d.getDay());
  var a=[];for(var i=0;i<7;i++){a.push(kStr(d));d.setDate(d.getDate()+1);}return a;
}
function findDoneInRange(id,keys){
  for(var i=0;i<keys.length;i++){if(doneEntry(keys[i],id))return keys[i];}
  return null;
}
function monthKeys(){
  var pre=todayK().slice(0,7);
  return Object.keys(doneLog).filter(function(k){return k.indexOf(pre)===0;});
}
function ensureMonth(y,m,cb){
  var pre=y+'-'+pad(m+1);
  if(monthCache[pre]){cb();return;}
  monthCache[pre]=true;
  Promise.all([
    db.ref(ROOT+'/done').orderByKey().startAt(pre+'-01').endAt(pre+'-31').once('value'),
    db.ref(ROOT+'/extras').orderByKey().startAt(pre+'-01').endAt(pre+'-31').once('value')
  ]).then(function(rs){
    Object.keys(archDone).forEach(function(k){if(k.indexOf(pre)===0)delete archDone[k];});
    Object.keys(archExtras).forEach(function(k){if(k.indexOf(pre)===0)delete archExtras[k];});
    rs[0].forEach(function(c){archDone[c.key]=c.val();});
    rs[1].forEach(function(c){archExtras[c.key]=c.val();});
    cb();
  });
}
/* ───── rows ───── */
function itemRow(opt){
  var de=opt.de;var mc=de&&MEMBERS[de.by]?MEMBERS[de.by].color:'#10b981';
  var h='<div class="item'+(de?' done':'')+'" style="--mc:'+mc+'">';
  h+='<button class="ckb'+(de?' on':'')+'" onclick="'+opt.action+'">✓</button>';
  h+='<div class="item-body"><div class="item-name">'+(opt.emoji?opt.emoji+' ':'')+opt.name+'</div>';
  h+='<div class="item-meta">'+ownBdg(opt.owner);
  if(opt.dateBdg)h+='<span class="date-bdg">'+opt.dateBdg+'</span>';
  if(opt.meta)h+='<span>'+opt.meta+'</span>';
  if(de&&MEMBERS[de.by])h+='<span class="by-ava">'+mkAva(de.by,17)+'</span><span style="color:'+MEMBERS[de.by].dark+';font-weight:700">'+MEMBERS[de.by].name+' 완료</span>';
  h+='</div></div>';
  if(opt.del)h+='<button class="del-x" onclick="'+opt.del+'">×</button>';
  h+='</div>';
  return h;
}
/* ───── render ───── */
function renderAll(){
  var tk=todayK();var wk=weekDates();var today=new Date();
  document.getElementById('monthLabel').textContent=(today.getMonth()+1)+'월 마지막 날까지';
  /* overdue */
  var ovH='',ovCnt=0;
  for(var i=7;i>=1;i--){
    var d=new Date();d.setDate(d.getDate()-i);var k=kStr(d);
    Object.keys(routines).forEach(function(id){
      var r=routines[id];
      if(!isDated(r)||!isScheduled(r,k)||doneEntry(k,id))return;
      ovCnt++;
      ovH+=itemRow({name:r.name,emoji:r.emoji,owner:r.owner,de:null,dateBdg:(d.getMonth()+1)+'/'+d.getDate()+' ('+WD[d.getDay()]+')',action:"toggle('"+k+"','"+id+"')"});
    });
    var ex=extrasAt(k);
    Object.keys(ex).forEach(function(xid){
      if(doneEntry(k,xid))return;
      ovCnt++;
      ovH+=itemRow({name:ex[xid].name,emoji:'📍',owner:ex[xid].owner||'any',de:null,dateBdg:(d.getMonth()+1)+'/'+d.getDate()+' ('+WD[d.getDay()]+')',action:"toggle('"+k+"','"+xid+"')",del:"delExtra('"+k+"','"+xid+"')"});
    });
  }
  document.getElementById('secOverdue').style.display=ovCnt?'':'none';
  document.getElementById('listOverdue').innerHTML=ovH;
  /* today progress */
  var tTotal=0,tDone=0;
  Object.keys(routines).forEach(function(id){
    var r=routines[id];if(!isDated(r)||!isScheduled(r,tk))return;
    tTotal++;if(doneEntry(tk,id))tDone++;
  });
  var tex=extrasAt(tk);
  Object.keys(tex).forEach(function(xid){tTotal++;if(doneEntry(tk,xid))tDone++;});
  document.getElementById('sumCount').textContent=tDone+'/'+tTotal;
  document.getElementById('pbarFill').style.width=(tTotal?Math.round(tDone/tTotal*100):0)+'%';
  /* weekly section: weekly routines + weekTodos */
  var wH='',wRemain=0,hasW=false;
  Object.keys(routines).forEach(function(id){
    var r=routines[id];if(r.freq!=='weekly')return;
    hasW=true;
    var dk=findDoneInRange(id,wk);var de=dk?doneEntry(dk,id):null;
    if(!de)wRemain++;
    wH+=itemRow({name:r.name,emoji:r.emoji,owner:r.owner,de:de,meta:de?dk.slice(5).replace('-','/')+' 완료':'매주 반복',action:de?"toggle('"+dk+"','"+id+"')":"toggle('"+tk+"','"+id+"')"});
  });
  Object.keys(weekTodos).forEach(function(id){
    hasW=true;
    var t=weekTodos[id];
    var dk=findDoneInRange(id,wk);var de=dk?doneEntry(dk,id):null;
    if(!de)wRemain++;
    wH+=itemRow({name:t.name,emoji:t.emoji||'🗓️',owner:t.owner||'any',de:de,meta:de?dk.slice(5).replace('-','/')+' 완료':'이번주만',action:de?"toggle('"+dk+"','"+id+"')":"toggle('"+tk+"','"+id+"')",del:de?null:"delWeekTodo('"+id+"')"});
  });
  document.getElementById('listWeekly').innerHTML=wH||'<div class="empty-row">이번주 안에 할 일이 없어요</div>';
  /* monthly */
  var mH='',mRemain=0,hasM=false;var mks=monthKeys();
  Object.keys(routines).forEach(function(id){
    var r=routines[id];if(r.freq!=='monthly')return;
    hasM=true;
    var dk=findDoneInRange(id,mks);var de=dk?doneEntry(dk,id):null;
    if(!de)mRemain++;
    mH+=itemRow({name:r.name,emoji:r.emoji,owner:r.owner,de:de,meta:de?dk.slice(5).replace('-','/')+' 완료':'매달 반복',action:de?"toggle('"+dk+"','"+id+"')":"toggle('"+tk+"','"+id+"')"});
  });
  document.getElementById('secMonthly').style.display=hasM?'':'none';
  document.getElementById('listMonthly').innerHTML=mH;
  /* badges */
  var bH='';
  bH+=ovCnt?'<span class="sbdg warn">⚠️ 밀린 일 '+ovCnt+'건</span>':'<span class="sbdg">밀린 일 없음 👍</span>';
  if(wRemain)bH+='<span class="sbdg">이번주 안에 '+wRemain+'건</span>';
  if(mRemain)bH+='<span class="sbdg">이번달 안에 '+mRemain+'건</span>';
  document.getElementById('sumBadges').innerHTML=bH;
  renderCal();
  renderDayPanel();
}
function renderCal(){
  var el=document.getElementById('calGrid');if(!el)return;
  document.getElementById('calLabel').textContent=calY+'년 '+(calM+1)+'월';
  var tk=todayK();
  var fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
  var h='';
  WD.forEach(function(w){h+='<div class="cal-wd">'+w+'</div>';});
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var d=1;d<=dim;d++){
    var k=calY+'-'+pad(calM+1)+'-'+pad(d);
    var dow=new Date(calY,calM,d).getDay();
    var dots=[],handled={};
    Object.keys(routines).forEach(function(id){
      var r=routines[id];var de=doneEntry(k,id);
      if(de){handled[id]=1;dots.push('<span class="cd" style="background:'+(MEMBERS[de.by]?MEMBERS[de.by].color:'#10b981')+'"></span>');}
      else if(isDated(r)&&isScheduled(r,k)){handled[id]=1;dots.push(k<tk?'<span class="cd miss"></span>':'<span class="cd due"></span>');}
    });
    var ex=extrasAt(k);
    Object.keys(ex).forEach(function(xid){
      handled[xid]=1;
      var de=doneEntry(k,xid);
      if(de)dots.push('<span class="cd" style="background:'+(MEMBERS[de.by]?MEMBERS[de.by].color:'#10b981')+'"></span>');
      else dots.push(k<tk?'<span class="cd miss"></span>':'<span class="cd due"></span>');
    });
    var dl=Object.assign({},archDone[k]||{},doneLog[k]||{});
    Object.keys(dl).forEach(function(id){
      if(handled[id])return;
      var de=dl[id];
      dots.push('<span class="cd" style="background:'+(MEMBERS[de.by]?MEMBERS[de.by].color:'#10b981')+'"></span>');
    });
    var more=dots.length>6?'<div class="cal-more">+'+(dots.length-6)+'</div>':'';
    h+='<div class="cal-cell'+(k===tk?' tdy':'')+(k===selDayK?' seld':'')+(dow===0?' sun':dow===6?' sat':'')+'" onclick="selectDay(\''+k+'\')"><div class="cal-dn">'+d+'</div><div class="cal-dots">'+dots.slice(0,6).join('')+'</div>'+more+'</div>';
  }
  el.innerHTML=h;
}
function calNav(d){
  calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}
  ensureMonth(calY,calM,renderCal);
}
function selectDay(k){
  selDayK=k;renderCal();renderDayPanel();
  document.getElementById('dayPanelSec').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function renderDayPanel(){
  var k=selDayK;var tk=todayK();var d=parseK(k);
  var lbl=(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WD[d.getDay()]+')';
  document.getElementById('dayTitle').textContent=(k===tk?'📌 오늘 할 일 · ':'📆 ')+lbl;
  var h='';
  Object.keys(routines).forEach(function(id){
    var r=routines[id];var de=doneEntry(k,id);
    if(!de&&!(isDated(r)&&isScheduled(r,k)))return;
    var act=k<=tk?"toggle('"+k+"','"+id+"')":"alert('아직 안 온 날이에요!')";
    h+=itemRow({name:r.name,emoji:r.emoji,owner:r.owner,de:de,meta:freqLabel(r),action:act});
  });
  var ex=extrasAt(k);
  Object.keys(ex).forEach(function(xid){
    var de=doneEntry(k,xid);
    var act=k<=tk?"toggle('"+k+"','"+xid+"')":"alert('아직 안 온 날이에요!')";
    h+=itemRow({name:ex[xid].name,emoji:'📍',owner:ex[xid].owner||'any',de:de,meta:'이날만',action:act,del:de?null:"delExtra('"+k+"','"+xid+"')"});
  });
  document.getElementById('listDay').innerHTML=h||'<div class="empty-row">이날 등록된 집안일이 없어요. ‘＋ 이날 추가’로 등록해봐요!</div>';
}
/* ───── actions ───── */
async function toggle(dateK,id){
  if(!me){openWho();return;}
  var cur=doneEntry(dateK,id);
  try{
    if(cur){await db.ref(ROOT+'/done/'+dateK+'/'+id).remove();}
    else{
      await db.ref(ROOT+'/done/'+dateK+'/'+id).set({by:me,ts:Date.now()});
      var nm=routines[id]?routines[id].name:(extrasAt(dateK)[id]||weekTodos[id]||{}).name;
      if(nm)db.ref(ROOT+'/notifications').push({ts:Date.now(),p:me,name:nm,act:'done'});
    }
    if(dateK<listenStartK){delete monthCache[dateK.slice(0,7)];ensureMonth(+dateK.slice(0,4),+dateK.slice(5,7)-1,renderAll);}
  }catch(e){alert('저장 실패: '+e.message);}
}
async function delExtra(dateK,xid){
  if(!confirm('이 할 일을 삭제할까?'))return;
  await db.ref(ROOT+'/extras/'+dateK+'/'+xid).remove();
  await db.ref(ROOT+'/done/'+dateK+'/'+xid).remove();
  if(dateK<listenStartK){delete monthCache[dateK.slice(0,7)];ensureMonth(+dateK.slice(0,4),+dateK.slice(5,7)-1,renderAll);}
}
async function delWeekTodo(id){
  if(!confirm('이 할 일을 삭제할까?'))return;
  var wk=weekDates();
  await db.ref(ROOT+'/weekTodos/'+wk[0]+'/'+id).remove();
  for(var i=0;i<wk.length;i++){if(doneEntry(wk[i],id))await db.ref(ROOT+'/done/'+wk[i]+'/'+id).remove();}
}
/* ───── unified add ───── */
var xType='date',xDays=[],xOwn='any';
function openAdd(preset){
  xType=preset==='week'?'week':'date';
  document.getElementById('xName').value='';
  document.getElementById('xEmoji').value='';
  document.getElementById('xMsg').textContent='';
  document.getElementById('xDate').value=selDayK;
  document.querySelectorAll('#typeSeg button').forEach(function(b){b.classList.toggle('on',b.dataset.t===xType);});
  syncAddOpts();
  document.getElementById('addBg').classList.add('show');
  document.getElementById('xName').focus();
}
function syncAddOpts(){
  document.getElementById('optDate').style.display=xType==='date'?'flex':'none';
  document.getElementById('optDays').style.display=xType==='days'?'flex':'none';
  document.getElementById('optDom').style.display=xType==='monthday'?'flex':'none';
}
async function addUnified(){
  var nm=document.getElementById('xName').value.trim();
  var em=document.getElementById('xEmoji').value.trim();
  var msg=document.getElementById('xMsg');
  if(!me){openWho();return;}
  if(!nm){msg.textContent='이름을 입력해줘!';return;}
  try{
    if(xType==='date'){
      var dk=document.getElementById('xDate').value;
      if(!dk){msg.textContent='날짜를 골라줘!';return;}
      await db.ref(ROOT+'/extras/'+dk).push({name:nm,owner:xOwn,emoji:em||null});
      if(dk<listenStartK){delete monthCache[dk.slice(0,7)];ensureMonth(+dk.slice(0,4),+dk.slice(5,7)-1,renderAll);}
      selectDay(dk);
      if(dk.slice(0,7)!==(calY+'-'+pad(calM+1))){calY=+dk.slice(0,4);calM=+dk.slice(5,7)-1;ensureMonth(calY,calM,renderCal);}
    }else if(xType==='week'){
      await db.ref(ROOT+'/weekTodos/'+weekDates()[0]).push({name:nm,owner:xOwn,emoji:em||null});
    }else{
      var obj={name:nm,emoji:em||'🧹',freq:xType,owner:xOwn,createdK:todayK()};
      if(xType==='days'){
        if(!xDays.length){msg.textContent='요일을 하나 이상 골라줘!';return;}
        obj.days=xDays.slice().sort();
      }
      if(xType==='monthday'){
        var dom=parseInt(document.getElementById('xDom').value,10);
        if(!dom||dom<1||dom>31){msg.textContent='1~31 사이 날짜를 넣어줘!';return;}
        obj.dom=dom;
      }
      await db.ref(ROOT+'/routines').push(obj);
    }
    db.ref(ROOT+'/notifications').push({ts:Date.now(),p:me,name:nm,act:'add'});
    document.getElementById('addBg').classList.remove('show');
  }catch(e){msg.textContent='저장 실패: '+e.message;}
}
function initAddForm(){
  document.querySelectorAll('#typeSeg button').forEach(function(b){
    b.onclick=function(){xType=b.dataset.t;document.querySelectorAll('#typeSeg button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');syncAddOpts();};
  });
  var dp=document.getElementById('optDays');
  WD.forEach(function(w,i){
    var b=document.createElement('button');b.textContent=w;
    b.onclick=function(){var ix=xDays.indexOf(i);if(ix>=0){xDays.splice(ix,1);b.classList.remove('on');}else{xDays.push(i);b.classList.add('on');}};
    dp.appendChild(b);
  });
  var os=document.querySelectorAll('#xOwnSeg button');
  os[1].textContent=MEMBERS.kh.name;os[2].textContent=MEMBERS.jn.name;
  os.forEach(function(b){
    b.onclick=function(){xOwn=b.dataset.o;os.forEach(function(x){x.classList.remove('on');});b.classList.add('on');};
  });
}
/* ───── manage list ───── */
function openManage(){renderRtList();document.getElementById('manageBg').classList.add('show');}
function renderRtList(){
  var h='';
  Object.keys(routines).forEach(function(id){
    var r=routines[id];
    h+='<div class="rt-row"><div class="rt-info"><div class="rt-name">'+(r.emoji?r.emoji+' ':'')+r.name+'</div><div class="rt-meta">'+freqLabel(r)+' · '+(r.owner==='any'?'같이':MEMBERS[r.owner].name)+'</div></div>'+ownBdg(r.owner)+'<button class="rt-del" onclick="delRoutine(\''+id+'\')">×</button></div>';
  });
  document.getElementById('rtList').innerHTML=h||'<div class="empty-row">아직 반복 루틴이 없어요</div>';
}
async function delRoutine(id){
  var r=routines[id];if(!r)return;
  if(!confirm('\''+r.name+'\' 루틴을 삭제할까?'))return;
  await db.ref(ROOT+'/routines/'+id).remove();
  renderRtList();
}
/* ───── who ───── */
function openWho(){
  var el=document.getElementById('whoBtns');el.innerHTML='';
  MK.forEach(function(p){
    var m=MEMBERS[p];
    var b=document.createElement('button');b.className='who-btn';
    b.innerHTML='<div style="width:54px;height:54px;margin:0 auto">'+mkAva(p,54)+'</div><div class="nm" style="color:'+m.dark+'">'+m.name+'</div>';
    b.onclick=function(){me=p;localStorage.setItem('hp_who',p);document.getElementById('whoBg').classList.remove('show');renderWho();};
    el.appendChild(b);
  });
  document.getElementById('whoBg').classList.add('show');
}
function renderWho(){
  if(me&&MEMBERS[me]){
    document.getElementById('whoAva').innerHTML=mkAva(me,24);
    document.getElementById('whoName').textContent=MEMBERS[me].name;
  }
}
/* ───── notifications ───── */
var notifs=[];
var notifLastRead=+(localStorage.getItem('hp_notifLastRead')||0);
function relTime(ts){
  var diff=Date.now()-ts;if(diff<0)diff=0;
  var m=Math.floor(diff/60000);
  if(m<1)return '방금 전';
  if(m<60)return m+'분 전';
  var h=Math.floor(m/60),rm=m%60;
  if(h<24)return h+'시간 '+(rm?rm+'분 ':'')+'전';
  return Math.floor(h/24)+'일 전';
}
function renderNotifs(){
  var badge=document.getElementById('notifBadge');
  var panel=document.getElementById('notifPanel');
  var unread=notifs.filter(function(n){return n.ts>notifLastRead;}).length;
  if(unread>0){badge.style.display='flex';badge.textContent=unread>99?'99+':unread;}
  else badge.style.display='none';
  var hdr='<div class="notif-hdr"><span class="notif-hdr-title">🔔 알림</span><span class="notif-hdr-sub">우리집 소식</span></div>';
  var empty='<div class="notif-empty">아직 새로운 소식이 없어요 🌿</div>';
  if(!notifs.length){panel.innerHTML=hdr+empty;return;}
  var html='';
  notifs.forEach(function(n){
    var m=MEMBERS[n.p];if(!m||!n.name)return;
    var tail=n.act==='add'?josa(n.name,'을','를')+' 새로 등록했어요 📝':josa(n.name,'을','를')+' 끝냈어요 ✨';
    var msg='<b style="color:'+m.dark+'">'+m.name+'</b>'+josa(m.name,'이','가')+' <b>'+n.name+'</b>'+tail;
    html+='<div class="notif-item'+(n.ts>notifLastRead?' unread':'')+'"><div class="notif-ava" style="background:'+m.light+';border-color:'+m.color+'55">'+mkAva(n.p,24)+'</div><div class="notif-body"><div class="notif-msg">'+msg+'</div><div class="notif-time">'+relTime(n.ts)+'</div></div><div class="notif-dot"></div></div>';
  });
  panel.innerHTML=hdr+(html||empty);
}
db.ref(ROOT+'/notifications').orderByKey().limitToLast(50).on('value',function(s){
  notifs=[];s.forEach(function(c){var v=c.val();if(v&&v.ts)notifs.push(v);});
  notifs.sort(function(a,b){return b.ts-a.ts;});
  renderNotifs();
});
document.getElementById('notifBtn').onclick=function(e){
  e.stopPropagation();
  var panel=document.getElementById('notifPanel');
  if(!panel.classList.contains('show')){
    renderNotifs();panel.classList.add('show');
    notifLastRead=Date.now();
    try{localStorage.setItem('hp_notifLastRead',String(notifLastRead));}catch(err){}
    document.getElementById('notifBadge').style.display='none';
  }else{panel.classList.remove('show');renderNotifs();}
};
document.addEventListener('click',function(e){
  var wrap=document.getElementById('notifWrap');var panel=document.getElementById('notifPanel');
  if(panel.classList.contains('show')&&!wrap.contains(e.target)){panel.classList.remove('show');renderNotifs();}
});
/* ───── listeners & seed ───── */
function checkLoaded(){loaded++;if(loaded>=3)document.getElementById('ov').style.display='none';}
db.ref(ROOT+'/routines').on('value',function(s){routines=s.val()||{};renderAll();checkLoaded();});
(function(){
  var start=new Date();start.setDate(start.getDate()-40);var sk=kStr(start);listenStartK=sk;
  db.ref(ROOT+'/done').orderByKey().startAt(sk).on('value',function(s){doneLog={};s.forEach(function(c){doneLog[c.key]=c.val();});renderAll();checkLoaded();});
  db.ref(ROOT+'/extras').orderByKey().startAt(sk).on('value',function(s){extras={};s.forEach(function(c){extras[c.key]=c.val();});renderAll();checkLoaded();});
  db.ref(ROOT+'/weekTodos/'+weekDates()[0]).on('value',function(s){weekTodos=s.val()||{};renderAll();});
})();
db.ref(ROOT+'/seeded').once('value',function(s){
  if(s.val())return;
  db.ref(ROOT+'/seeded').set(true);
  var ck=todayK();
  var defaults=[
    {name:'설거지',emoji:'🍽️',freq:'daily',owner:'any',createdK:ck},
    {name:'바닥 청소',emoji:'🧹',freq:'days',days:[0,3],owner:'any',createdK:ck},
    {name:'분리수거',emoji:'♻️',freq:'days',days:[0],owner:'any',createdK:ck},
    {name:'빨래',emoji:'👕',freq:'weekly',owner:'any',createdK:ck},
    {name:'화장실 청소',emoji:'🚽',freq:'weekly',owner:'any',createdK:ck},
    {name:'침구 세탁',emoji:'🛏️',freq:'monthly',owner:'any',createdK:ck}
  ];
  defaults.forEach(function(r){db.ref(ROOT+'/routines').push(r);});
});
initAddForm();
renderWho();
if(!me)setTimeout(openWho,600);
setInterval(function(){renderAll();renderNotifs();},60000);
</script>
